<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Your Password - GoReturn</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#F0F2F5;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{width:100%;max-width:420px;padding:20px}
.logo-section{text-align:center;margin-bottom:32px}
.logo img{height:56px;mix-blend-mode:multiply}
.logo-sub{color:#6B7280;font-size:13px;margin-top:4px}
.card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.08);padding:36px;border:1px solid #E5E7EB}
.card h2{font-size:22px;font-weight:700;color:#111827;margin-bottom:4px}
.card p.subtitle{font-size:14px;color:#6B7280;margin-bottom:28px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
.form-group input{width:100%;padding:12px 14px;border:1.5px solid #D1D5DB;border-radius:10px;font-size:14px;font-family:inherit;outline:none;background:#FAFAFA}
.form-group input:focus{border-color:#4F46E5;background:white;box-shadow:0 0 0 3px rgba(79,70,229,0.1)}
.btn{width:100%;padding:13px;background:#4F46E5;color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn:hover{background:#4338CA}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.msg.error{background:#FEF2F2;border:1px solid #FECACA;color:#DC2626}
.msg.success{background:#F0FDF4;border:1px solid #BBF7D0;color:#16A34A}
.welcome{background:#EEF2FF;border-radius:8px;padding:12px;margin-bottom:20px;font-size:13px;color:#4338CA}
</style>
</head>
<body>
<div class="container">
  <div class="logo-section">
    <div class="logo"><img src="/logo.png" alt="GoReturn"></div>
    <div class="logo-sub">Returns & Exchanges Platform</div>
  </div>
  <div class="card">
    <h2>Set your password</h2>
    <p class="subtitle">Create a password to activate your account</p>
    <div class="msg error" id="errBox"></div>
    <div class="msg success" id="okBox"></div>
    <div class="welcome" id="welcome" style="display:none"></div>
    <div id="formArea">
      <div class="form-group"><label>New Password</label><input type="password" id="pass" placeholder="At least 6 characters"></div>
      <div class="form-group"><label>Confirm Password</label><input type="password" id="pass2" placeholder="Re-enter password"></div>
      <button class="btn" id="submitBtn" onclick="setPassword()">Set Password & Activate</button>
    </div>
  </div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
const errBox=document.getElementById('errBox'), okBox=document.getElementById('okBox');
function showErr(m){errBox.textContent=m;errBox.style.display='block';okBox.style.display='none';}
function showOk(m){okBox.textContent=m;okBox.style.display='block';errBox.style.display='none';}

async function init(){
  if(!token){showErr('Invalid invite link.');document.getElementById('formArea').style.display='none';return;}
  try{
    const r=await fetch('/api/team/invite/'+token);
    const d=await r.json();
    if(!r.ok)throw new Error(d.error);
    const w=document.getElementById('welcome');
    w.innerHTML='Welcome <strong>'+d.name+'</strong> ('+d.email+') — role: <strong>'+d.role+'</strong>';
    w.style.display='block';
  }catch(e){showErr(e.message);document.getElementById('formArea').style.display='none';}
}
async function setPassword(){
  const p=document.getElementById('pass').value, p2=document.getElementById('pass2').value;
  if(p.length<6){showErr('Password must be at least 6 characters');return;}
  if(p!==p2){showErr('Passwords do not match');return;}
  const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='Setting...';
  try{
    const r=await fetch('/api/team/set-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:p})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error);
    showOk('Password set! Redirecting to login...');
    document.getElementById('formArea').style.display='none';
    setTimeout(()=>location.href='/login',1800);
  }catch(e){showErr(e.message);btn.disabled=false;btn.textContent='Set Password & Activate';}
}
init();
</script>
</body>
</html>
