<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - GoReturn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F9FAFB;color:#1F2937;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{text-align:center;padding:40px}
.code{font-size:80px;font-weight:800;color:#4F46E5;line-height:1}
h1{font-size:24px;font-weight:600;margin:12px 0 8px}
p{color:#6B7280;font-size:15px;margin-bottom:24px}
a{display:inline-flex;align-items:center;gap:6px;background:#4F46E5;color:white;padding:10px 24px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500}
a:hover{background:#3730A3}
</style>
</head>
<body>
<div class="box">
<div class="code">404</div>
<h1>Page not found</h1>
<p>The page you're looking for doesn't exist or has been moved.</p>
<a href="/">Go to Dashboard</a>
</div>
</body>
</html>
